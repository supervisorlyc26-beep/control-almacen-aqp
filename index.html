<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Almacén AQP — Turno B & C</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --bg-deep:#060b18;--bg-base:#0a1021;--bg-card:#0e1529;--bg-elevated:#131b33;
  --border:#1a2444;--border-light:#243056;
  --text-primary:#e8ecf4;--text-secondary:#7b8baa;--text-muted:#4a5578;
  --cyan:#00d4ff;--cyan-dim:#00d4ff22;
  --amber:#ffb020;--amber-dim:#ffb02022;
  --violet:#a78bfa;--violet-dim:#a78bfa22;
  --emerald:#34d399;--emerald-dim:#34d39922;
  --red:#f87171;--red-dim:#f8717122;
  --gradient-main:linear-gradient(135deg,#00d4ff,#a78bfa);
  --radius:10px;--radius-lg:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
.header{background:linear-gradient(180deg,var(--bg-elevated),var(--bg-base));border-bottom:1px solid var(--border);padding:14px 20px 0;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--gradient-main);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.logo h1{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo h1 span{background:var(--gradient-main);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:var(--text-muted);font-weight:500}
.header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.live-clock{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--cyan);background:var(--bg-deep);border:1px solid var(--border);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:6px}
.clock-dot{width:8px;height:8px;border-radius:50%;background:var(--emerald);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.turno-switch{display:flex;background:var(--bg-deep);border-radius:8px;padding:3px;border:1px solid var(--border)}
.turno-btn{padding:7px 20px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text-muted);font-family:inherit;transition:all .25s}
.turno-btn.active{background:var(--gradient-main);color:#fff;box-shadow:0 2px 12px rgba(0,212,255,.3)}
.turno-btn:hover:not(.active){color:var(--text-secondary)}
.nav{display:flex;gap:2px}
.nav-btn{padding:10px 18px;border:none;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text-muted);font-family:inherit;transition:all .2s}
.nav-btn.active{background:var(--bg-deep);color:var(--cyan)}
.nav-btn:hover:not(.active){color:var(--text-secondary);background:var(--bg-deep);opacity:.6}
.export-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--emerald);background:var(--emerald-dim);color:var(--emerald);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:5px}
.export-btn:hover{background:var(--emerald);color:#fff}
.main{padding:18px 20px;max-width:1140px;margin:0 auto}
.section{display:none}.section.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-title{font-size:17px;font-weight:800;letter-spacing:-0.3px}
.filter-select{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:13px;font-family:inherit}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-bottom:18px}
.kpi-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;gap:14px;align-items:center;transition:border-color .2s}
.kpi-card:hover{border-color:var(--border-light)}
.kpi-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.kpi-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.kpi-value{font-size:24px;font-weight:800;margin:2px 0;font-family:'JetBrains Mono',monospace}
.kpi-sub{font-size:11px;color:var(--text-muted);font-weight:500}
.chart-grid{display:grid;grid-template-columns:1fr;gap:14px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 14px 10px}
.chart-title{font-size:12px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{position:relative;width:100%;height:280px}
.chart-wrap canvas{display:block}
.chart-wrap-sm{height:240px}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.chart-tooltip{position:absolute;background:var(--bg-elevated);border:1px solid var(--border-light);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.chart-tooltip.visible{opacity:1}
.tt-label{color:var(--text-muted);margin-bottom:4px;font-weight:600}
.tt-row{display:flex;align-items:center;gap:6px;margin-top:2px}
.tt-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tt-val{color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-weight:500}
.form-wrap{max-width:680px;margin:0 auto}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px}
.form-input{padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-deep);color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;width:100%}
.form-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim)}
.form-input::placeholder{color:var(--text-muted)}
.form-input[readonly]{background:var(--bg-elevated);color:var(--cyan);cursor:default;border-color:transparent}
.form-divider{grid-column:1/-1;border-top:1px solid var(--border);padding-top:10px;margin-top:4px}
.form-divider span{font-size:12px;font-weight:800;color:var(--cyan);text-transform:uppercase;letter-spacing:.5px}
.submit-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--gradient-main);color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:18px;font-family:inherit;transition:transform .15s,box-shadow .15s}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,212,255,.3)}
.success-banner{background:var(--emerald-dim);border:1px solid var(--emerald);border-radius:var(--radius);padding:12px;margin-bottom:14px;color:var(--emerald);font-weight:700;font-size:14px;text-align:center;animation:fadeUp .3s ease}
.preview{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:14px}
.preview-title{font-size:11px;font-weight:800;color:var(--cyan);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:13px;color:var(--text-secondary)}
.preview-grid b{color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:12px}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.reset-btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid rgba(248,113,113,.4);background:var(--red-dim);color:var(--red)}
.reset-btn:hover{background:var(--red);color:#fff}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);max-height:65vh;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:10px 8px;background:var(--bg-elevated);color:var(--text-muted);font-weight:700;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:2}
td{padding:6px 8px;border-bottom:1px solid rgba(26,36,68,.3);white-space:nowrap;color:var(--text-secondary)}
td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-primary)}
td.hl{font-weight:800;color:var(--amber)}
tr:nth-child(even){background:var(--bg-deep)}
tr:nth-child(odd){background:var(--bg-base)}
tr:hover{background:var(--bg-elevated)}
.del-btn,.edit-btn{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px}
.del-btn{color:rgba(248,113,113,.5)}.del-btn:hover{color:var(--red)}
.edit-btn{color:rgba(0,212,255,.5)}.edit-btn:hover{color:var(--cyan)}
.cell-edit{background:var(--bg-deep);border:1px solid var(--cyan);border-radius:4px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 6px;width:70px;outline:none}
.cell-edit:focus{box-shadow:0 0 0 2px var(--cyan-dim)}
.footer{text-align:center;padding:18px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border)}
@media(max-width:700px){
  .header-top{flex-direction:column;align-items:flex-start}
  .header-controls{width:100%;justify-content:space-between}
  .form-grid{grid-template-columns:1fr}
  .preview-grid{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:1fr}
  .chart-row{grid-template-columns:1fr}
  .nav-btn{padding:8px 12px;font-size:12px}
  .live-clock{font-size:11px;padding:5px 8px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">A</div>
      <div>
        <h1><span>Control Almacén AQP</span></h1>
        <div class="logo-sub">Sistema de Registro y Dashboard — Turno B & C</div>
      </div>
    </div>
    <div class="header-controls">
      <div class="live-clock"><div class="clock-dot"></div><span id="clock-text">--:--:--</span></div>
      <div class="turno-switch">
        <button class="turno-btn active" onclick="switchTurno('B')">Turno B</button>
        <button class="turno-btn" onclick="switchTurno('C')">Turno C</button>
      </div>
      <button class="export-btn" onclick="manualRefresh()" id="refreshBtn">🔄 Actualizar</button>
      <button class="export-btn" onclick="exportToExcel()">📥 Exportar Excel</button>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchView('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="switchView('registro')">📝 Registro</button>
    <button class="nav-btn" onclick="switchView('historial')">📋 Historial</button>
  </nav>
</header>

<div class="main">
  <div id="sec-dashboard" class="section active">
    <div class="dash-header">
      <h2 class="section-title" id="dash-title">Dashboard Turno B — Arequipa</h2>
      <select class="filter-select" id="dateFilter" onchange="renderDashboard()">
        <option value="7">Últimos 7 días</option>
        <option value="15">Últimos 15 días</option>
        <option value="30" selected>Últimos 30 días</option>
        <option value="0">Todo el historial</option>
      </select>
    </div>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-title">Productividad</div><div class="chart-wrap" id="wrap-c1"><canvas id="c1"></canvas><div class="chart-tooltip" id="tt-c1"></div></div><div class="legend" id="leg1"></div></div>
      <div class="chart-row">
        <div class="chart-card"><div class="chart-title" id="c2t">Volumen</div><div class="chart-wrap chart-wrap-sm" id="wrap-c2"><canvas id="c2"></canvas><div class="chart-tooltip" id="tt-c2"></div></div><div class="legend" id="leg2"></div></div>
        <div class="chart-card"><div class="chart-title">Distribución Acumulada</div><div class="chart-wrap chart-wrap-sm" id="wrap-c4"><canvas id="c4"></canvas></div><div class="legend" id="leg4"></div></div>
      </div>
      <div class="chart-card"><div class="chart-title">Tiempos de Operación (hrs)</div><div class="chart-wrap" id="wrap-c3"><canvas id="c3"></canvas><div class="chart-tooltip" id="tt-c3"></div></div><div class="legend" id="leg3"></div></div>
    </div>
  </div>
  <div id="sec-registro" class="section">
    <div class="form-wrap">
      <h2 class="section-title" id="form-title" style="margin-bottom:14px">Registro Diario — Turno B</h2>
      <div id="success-msg"></div>
      <div class="form-grid" id="form-fields"></div>
      <div id="preview-box"></div>
      <button class="submit-btn" onclick="submitForm()">💾 Guardar Registro</button>
    </div>
  </div>
  <div id="sec-historial" class="section">
    <div class="hist-header">
      <h2 class="section-title" id="hist-title">Historial — Turno B</h2>
      <button class="reset-btn" onclick="resetAll()">🗑️ Limpiar todo</button>
    </div>
    <div class="table-wrap"><table id="hist-table"></table></div>
  </div>
</div>
<footer class="footer">Control Almacén AQP — Turno B & C © 2026</footer>

<!-- ═══════════════════════════════════════════════════════════
     ALL LOGIC IN ONE NORMAL SCRIPT — runs synchronously first
     ═══════════════════════════════════════════════════════════ -->
<script>
var CT='B', CV='dashboard';
var RB=[], RC=[];
var editingRow=null;
var chartMeta={};
var COLORS={cyan:'#00d4ff',amber:'#ffb020',violet:'#a78bfa',emerald:'#34d399',red:'#f87171'};

// Firebase update hook — overridden by module script when Firebase loads
var firebaseUpdateRecord = null;

function gr(){return CT==='B'?RB:RC}
function sr(d){if(CT==='B')RB=d;else RC=d}

// ── CLOCK ──
function updateClock(){
  var now=new Date();
  var days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  document.getElementById('clock-text').textContent=
    days[now.getDay()]+' '+String(now.getDate()).padStart(2,'0')+'/'+String(now.getMonth()+1).padStart(2,'0')+' — '+
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
}
setInterval(updateClock,1000);updateClock();

// ── WEEK ──
function getWeekStr(ds){
  if(!ds)return '';
  var d=new Date(ds+'T12:00:00');
  var oneJan=new Date(d.getFullYear(),0,1);
  var wn=Math.ceil(((d-oneJan)/86400000+oneJan.getDay()+1)/7);
  return 'SEM '+wn+' - '+String(d.getFullYear()).slice(2);
}

// ── TIME ──
function tdH(a,b){if(!a||!b)return 0;var pa=a.split(':').map(Number),pb=b.split(':').map(Number);var d=(pb[0]*60+pb[1])-(pa[0]*60+pa[1]);if(d<0)d+=1440;return d/60}
function tdS(a,b){var h=tdH(a,b);return String(Math.floor(h)).padStart(2,'0')+':'+String(Math.round((h-Math.floor(h))*60)).padStart(2,'0')}

// ── ENRICH ──
function enrich(r){
  var o={};for(var k in r)o[k]=r[k];
  if(CT==='B'){o.tE=(r.envasesCDA||0)+(r.envasesOLE||0);o.tP=(r.productosCDA||0)+(r.productosOLE||0);o.tG=o.tE+o.tP;o.tO=(r.opEnvase||0)+(r.opProductos||0);o.hO=tdH(r.inicioOp,r.finOp);o.pO=o.tO>0?o.tG/o.tO:0;o.pH=o.tO>0&&o.hO>0?o.tG/(o.tO*o.hO):0;o.tStr=tdS(r.inicioOp,r.finOp)}
  else{o.tCF=(r.cfOLE||0)+(r.cfCDA||0);o.hC=tdH(r.inicioCuadre,r.finCuadre);o.hA=tdH(r.inicioArmado,r.finArmado);o.hT=o.hC+o.hA;o.pO=r.operarios>0?o.tCF/r.operarios:0;o.pH=r.operarios>0&&o.hT>0?o.tCF/(r.operarios*o.hT):0;o.tCS=tdS(r.inicioCuadre,r.finCuadre);o.tAS=tdS(r.inicioArmado,r.finArmado)}
  return o;
}
function getF(){var recs=gr().map(enrich).sort(function(a,b){return a.fecha.localeCompare(b.fecha)});var n=parseInt(document.getElementById('dateFilter').value);return n>0?recs.slice(-n):recs}

// ── NAV ──
function switchTurno(t){CT=t;var btns=document.querySelectorAll('.turno-btn');btns[0].classList.toggle('active',t==='B');btns[1].classList.toggle('active',t==='C');editingRow=null;refresh()}
function switchView(v){CV=v;document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.textContent.toLowerCase().indexOf(v.slice(0,4))>=0)});document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active')});document.getElementById('sec-'+v).classList.add('active');refresh()}
function refresh(){if(CV==='dashboard')renderDashboard();else if(CV==='registro')renderForm();else renderHistorial()}

// ── CANVAS CHARTS ──
function setupCanvas(id){var canvas=document.getElementById(id);if(!canvas)return null;var wrap=canvas.parentElement;var dpr=window.devicePixelRatio||1;var w=wrap.clientWidth;var h=wrap.clientHeight;canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);return{ctx:ctx,W:w,H:h}}

function drawLine(cid,lid,labels,datasets){
  var c=setupCanvas(cid);if(!c)return;var ctx=c.ctx,W=c.W,H=c.H;
  var pad={t:14,r:14,b:30,l:48},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var allV=[];datasets.forEach(function(ds){allV=allV.concat(ds.data)});
  var mn=Math.min.apply(null,allV),mx=Math.max.apply(null,allV);
  if(mn===mx){mn-=10;mx+=10}var rng=mx-mn;mn-=rng*.05;mx+=rng*.05;
  ctx.strokeStyle='#1a244455';ctx.lineWidth=.5;
  for(var i=0;i<=5;i++){var y=pad.t+cH-cH*(i/5);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#4a5578';ctx.font='10px DM Sans';ctx.textAlign='right';ctx.fillText(Math.round(mn+(mx-mn)*(i/5)),pad.l-5,y+3)}
  var step=Math.max(1,Math.floor(labels.length/10));ctx.fillStyle='#4a5578';ctx.font='9px DM Sans';ctx.textAlign='center';
  labels.forEach(function(l,i){if(i%step===0)ctx.fillText(l,pad.l+cW*(i/(labels.length-1||1)),H-pad.b+18)});
  datasets.forEach(function(ds){ctx.strokeStyle=ds.color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.beginPath();
    ds.data.forEach(function(v,i){var x=pad.l+cW*(i/(labels.length-1||1));var yy=pad.t+cH-(cH*((v-mn)/(mx-mn)));i===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy)});ctx.stroke();
    if(ds.fill){ctx.lineTo(pad.l+cW,pad.t+cH);ctx.lineTo(pad.l,pad.t+cH);ctx.closePath();ctx.fillStyle=ds.color+'18';ctx.fill()}});
  datasets.forEach(function(ds){ds.data.forEach(function(v,i){var x=pad.l+cW*(i/(labels.length-1||1));var yy=pad.t+cH-(cH*((v-mn)/(mx-mn)));ctx.beginPath();ctx.arc(x,yy,3,0,Math.PI*2);ctx.fillStyle=ds.color;ctx.fill()})});
  chartMeta[cid]={type:'line',pad:pad,cW:cW,cH:cH,mn:mn,mx:mx,labels:labels,datasets:datasets};
  document.getElementById(lid).innerHTML=datasets.map(function(ds){return '<div class="legend-item"><div class="legend-dot" style="background:'+ds.color+'"></div>'+ds.label+'</div>'}).join('');
}

function drawBar(cid,lid,labels,datasets){
  var c=setupCanvas(cid);if(!c)return;var ctx=c.ctx,W=c.W,H=c.H;
  var pad={t:14,r:14,b:30,l:54},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var mx=0;datasets.forEach(function(ds){ds.data.forEach(function(v){if(v>mx)mx=v})});if(mx===0)mx=100;mx*=1.1;
  ctx.strokeStyle='#1a244455';ctx.lineWidth=.5;
  for(var i=0;i<=5;i++){var y=pad.t+cH-cH*(i/5);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#4a5578';ctx.font='10px DM Sans';ctx.textAlign='right';ctx.fillText(Math.round(mx*(i/5)),pad.l-5,y+3)}
  var n=labels.length,grpW=cW/n,barW=grpW/(datasets.length+1);var step=Math.max(1,Math.floor(n/10));
  labels.forEach(function(l,li){datasets.forEach(function(ds,di){var x=pad.l+grpW*li+barW*(di+.5);var bh=cH*(ds.data[li]/mx);var by=pad.t+cH-bh;ctx.fillStyle=ds.color;ctx.beginPath();var r=3;ctx.moveTo(x+r,by);ctx.lineTo(x+barW*.8-r,by);ctx.quadraticCurveTo(x+barW*.8,by,x+barW*.8,by+r);ctx.lineTo(x+barW*.8,by+bh);ctx.lineTo(x,by+bh);ctx.lineTo(x,by+r);ctx.quadraticCurveTo(x,by,x+r,by);ctx.fill()});if(li%step===0){ctx.fillStyle='#4a5578';ctx.font='9px DM Sans';ctx.textAlign='center';ctx.fillText(l,pad.l+grpW*(li+.5),H-pad.b+18)}});

function drawDonut(cid,lid,slices){
  var c=setupCanvas(cid);if(!c)return;var ctx=c.ctx,W=c.W,H=c.H;

  slices.forEach(function(sl){var sw=total>0?(sl.value/total)*Math.PI*2:0;ctx.beginPath();ctx.arc(cx,cy,R,angle,angle+sw);ctx.arc(cx,cy,r,angle+sw,angle,true);ctx.closePath();ctx.fillStyle=sl.color;ctx.fill();angle+=sw});

<!-- ═══════════════════════════════════════════════════════════
     FIREBASE MODULE — loads AFTER, overrides submit/delete/reset
     ═══════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDpLn_4GUBF7PIYdzIUnqsb0nuMVjScL6k",
    authDomain: "control-almacen-aqp.firebaseapp.com",
    databaseURL: "https://control-almacen-aqp-default-rtdb.firebaseio.com",
    projectId: "control-almacen-aqp",
    storageBucket: "control-almacen-aqp.firebasestorage.app",
    messagingSenderId: "416002289224",
    appId: "1:416002289224:web:49d193c3fe6ed96242327d"
  };

  try {
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Override data with Firebase realtime listeners
    onValue(ref(db, 'aqp_tB'), (snapshot) => {
      const data = snapshot.val();
      RB = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
      refresh();
    });

    onValue(ref(db, 'aqp_tC'), (snapshot) => {
      const data = snapshot.val();
      RC = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
      refresh();
    });

    // Override submit
    window.submitForm = function() {
      var fields = CT === 'B' ? fB : fC;
      var numF = CT === 'B' ? ['envasesCDA','envasesOLE','productosCDA','productosOLE','opEnvase','opProductos','montacarguistas','controladores'] : ['operarios','montacarguistas','controladores','palanca','supervisor','cantidadOC','cfOLE','cfCDA'];
      var entry = {};
      fields.forEach(function(f) {
        if (f.d) return;
        var el = document.getElementById('f_' + f.id);
        if (!el) return;
        entry[f.id] = numF.indexOf(f.id) >= 0 ? (Number(el.value) || 0) : el.value;
      });
      push(ref(db, CT === 'B' ? 'aqp_tB' : 'aqp_tC'), entry).then(() => {
        document.getElementById('success-msg').innerHTML = '<div class="success-banner">✅ Sincronizado con la nube</div>';
        setTimeout(() => document.getElementById('success-msg').innerHTML = '', 2500);
        renderForm();
      });
    };

    // Override delete
    window.deleteRec = function(id) {
      if (confirm('¿Eliminar este registro?')) {
        remove(ref(db, (CT === 'B' ? 'aqp_tB/' : 'aqp_tC/') + id));
      }
    };

    // Override reset
    window.resetAll = function() {
      if (!confirm('¿Borrar TODOS los registros del Turno ' + CT + ' en la nube?')) return;
      set(ref(db, CT === 'B' ? 'aqp_tB' : 'aqp_tC'), null);
    };

    // Expose update for inline editing
    window.firebaseUpdateRecord = function(id, field, value) {
      var path = (CT === 'B' ? 'aqp_tB/' : 'aqp_tC/') + id;
      var updates = {};
      updates[field] = value;
      update(ref(db, path), updates);
    };

    console.log('🔥 Firebase conectado correctamente');
    firebaseConnected = true;
  } catch(e) {
    console.log('⚠️ Firebase no configurado, usando almacenamiento local. Error:', e.message);
  }
</script>
